
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
  },
});

const diagram = `erDiagram

  WORKSPACES {
    uuid workspace_id PK
    uuid project_id FK "from Module 3"
    uuid created_by FK "from Module 1"
    varchar name
    boolean is_active
    timestamp created_at
    timestamp updated_at
    timestamp deleted_at
  }

  WORKSPACE_ROLES {
    uuid role_id PK
    uuid workspace_id FK
    varchar role_name
    jsonb permissions
    timestamp created_at
  }

  WORKSPACE_MEMBERS {
    uuid workspace_id FK
    uuid user_id FK "from Module 1"
    uuid role_id FK
    timestamp joined_at
  }

  WORKSPACE_INVITATIONS {
    uuid invitation_id PK
    uuid workspace_id FK
    uuid invited_by FK "from Module 1"
    uuid invitee_user_id FK "from Module 1"
    varchar invitee_email
    varchar status
    timestamp invited_at
    timestamp responded_at
  }

  TASKS {
    uuid task_id PK
    uuid workspace_id FK
    uuid parent_task_id FK "self-ref subtasks"
    varchar title
    text description
    varchar status
    varchar priority
    uuid assigned_to FK "from Module 1"
    uuid created_by FK "from Module 1"
    timestamp deadline
    timestamp created_at
    timestamp updated_at
    timestamp deleted_at
  }

  FILES {
    uuid file_id PK
    uuid workspace_id FK
    uuid task_id FK
    uuid uploaded_by FK "from Module 1"
    varchar file_name
    text file_path
    varchar mime_type
    bigint file_size_bytes
    int version
    timestamp created_at
    timestamp deleted_at
  }

  ACTIVITY_LOGS {
    uuid log_id PK
    uuid workspace_id FK
    uuid actor_user_id FK "from Module 1"
    varchar action_type
    varchar entity_type
    uuid entity_id
    jsonb old_value
    jsonb new_value
    timestamp created_at
  }

  WORKSPACES ||--o{ WORKSPACE_ROLES : "defines"
  WORKSPACES ||--o{ WORKSPACE_MEMBERS : "has"
  WORKSPACES ||--o{ WORKSPACE_INVITATIONS : "sends"
  WORKSPACES ||--o{ TASKS : "contains"
  WORKSPACES ||--o{ FILES : "stores"
  WORKSPACES ||--o{ ACTIVITY_LOGS : "tracks"
  WORKSPACE_ROLES ||--o{ WORKSPACE_MEMBERS : "assigned to"
  TASKS ||--o{ TASKS : "parent of"
  TASKS ||--o{ FILES : "attached to"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
